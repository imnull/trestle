name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      
      - name: Build
        run: cargo build --release
      
      - name: Package
        run: |
          mkdir -p release
          cp target/release/trestle release/
          cp config.example.toml release/ || true
          cp providers.example.toml release/ || true
          cp routes.example.toml release/ || true
          cd release && tar -czvf ../trestle-linux-x64.tar.gz .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trestle-linux-x64
          path: trestle-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release
      
      - name: Package
        run: |
          mkdir release
          copy target\release\trestle.exe release\
          copy config.example.toml release\ 2>nul || true
          copy providers.example.toml release\ 2>nul || true
          copy routes.example.toml release\ 2>nul || true
          cd release
          7z a ../trestle-windows-x64.zip .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trestle-windows-x64
          path: trestle-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Add Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      
      - name: Build universal binary
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          
          mkdir -p universal
          lipo -create \
            target/x86_64-apple-darwin/release/trestle \
            target/aarch64-apple-darwin/release/trestle \
            -output universal/trestle
      
      - name: Create app bundle
        run: |
          mkdir -p Trestle.app/Contents/MacOS
          mkdir -p Trestle.app/Contents/Resources
          cp universal/trestle Trestle.app/Contents/MacOS/
          
          cat > Trestle.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>trestle</string>
              <key>CFBundleIdentifier</key>
              <string>ai.trestle.app</string>
              <key>CFBundleName</key>
              <string>Trestle</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
      
      - name: Create DMG
        run: |
          mkdir -p dmg_content
          cp -R Trestle.app dmg_content/
          ln -s /Applications dmg_content/Applications
          
          hdiutil create -volname "Trestle" \
            -srcfolder dmg_content \
            -ov -format UDZO \
            Trestle-macOS-universal.dmg
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trestle-macos-universal
          path: Trestle-macOS-universal.dmg

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: List files
        run: find . -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.tar.gz" \) | head -20
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            trestle-linux-x64/trestle-linux-x64.tar.gz
            trestle-windows-x64/trestle-windows-x64.zip
            trestle-macos-universal/Trestle-macOS-universal.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
