name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Build
        run: cargo build --release
      
      - name: Package
        run: |
          mkdir -p release
          cp target/release/trestle release/
          cp config.example.toml release/ || true
          cp providers.example.toml release/ || true
          cp routes.example.toml release/ || true
          cd release && tar -czvf ../trestle-linux-x64.tar.gz .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trestle-linux-x64
          path: trestle-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release
      
      - name: Package
        run: |
          mkdir release
          copy target\release\trestle.exe release\
          copy config.example.toml release\ 2>nul || true
          copy providers.example.toml release\ 2>nul || true
          copy routes.example.toml release\ 2>nul || true
          cd release
          7z a ../trestle-windows-x64.zip .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trestle-windows-x64
          path: trestle-windows-x64.zip

  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      
      - name: Build
        run: cargo build --release --target x86_64-apple-darwin
      
      - name: Create app bundle
        run: |
          mkdir -p Trestle.app/Contents/MacOS
          mkdir -p Trestle.app/Contents/Resources
          cp target/x86_64-apple-darwin/release/trestle Trestle.app/Contents/MacOS/
          
          cat > Trestle.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>trestle</string>
              <key>CFBundleIdentifier</key>
              <string>ai.trestle.app</string>
              <key>CFBundleName</key>
              <string>Trestle</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${GITHUB_REF_NAME#v}</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
      
      - name: Create archive
        run: |
          zip -r Trestle-macOS-x86_64.zip Trestle.app
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trestle-macos-x86_64
          path: Trestle-macOS-x86_64.zip

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      
      - name: Create app bundle
        run: |
          mkdir -p Trestle.app/Contents/MacOS
          mkdir -p Trestle.app/Contents/Resources
          cp target/aarch64-apple-darwin/release/trestle Trestle.app/Contents/MacOS/
          
          cat > Trestle.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>trestle</string>
              <key>CFBundleIdentifier</key>
              <string>ai.trestle.app</string>
              <key>CFBundleName</key>
              <string>Trestle</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${GITHUB_REF_NAME#v}</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
      
      - name: Create archive
        run: |
          zip -r Trestle-macOS-arm64.zip Trestle.app
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trestle-macos-arm64
          path: Trestle-macOS-arm64.zip

  build-macos-universal:
    runs-on: macos-latest
    needs: [build-macos-intel, build-macos-arm]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      
      - name: Build universal
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          
          mkdir -p universal
          lipo -create \
            target/x86_64-apple-darwin/release/trestle \
            target/aarch64-apple-darwin/release/trestle \
            -output universal/trestle
      
      - name: Create app bundle
        run: |
          mkdir -p Trestle.app/Contents/MacOS
          mkdir -p Trestle.app/Contents/Resources
          cp universal/trestle Trestle.app/Contents/MacOS/
          
          cat > Trestle.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>trestle</string>
              <key>CFBundleIdentifier</key>
              <string>ai.trestle.app</string>
              <key>CFBundleName</key>
              <string>Trestle</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${GITHUB_REF_NAME#v}</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
      
      - name: Create archive
        run: |
          zip -r Trestle-macOS-universal.zip Trestle.app
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trestle-macos-universal
          path: Trestle-macOS-universal.zip

  release:
    needs: [build-linux, build-windows, build-macos-universal]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            trestle-linux-x64/trestle-linux-x64.tar.gz
            trestle-windows-x64/trestle-windows-x64.zip
            trestle-macos-x86_64/Trestle-macOS-x86_64.zip
            trestle-macos-arm64/Trestle-macOS-arm64.zip
            trestle-macos-universal/Trestle-macOS-universal.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
